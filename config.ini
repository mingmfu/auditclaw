# AuditClaw 配置文件

## 基本信息
PROJECT_NAME = "AuditClaw"
VERSION = "2.0.0"
DESCRIPTION = "专业审计招标信息采集系统"

## 采集配置
[COLLECTION]
# 目标网站
TARGET_URL = "https://www.china-hxzb.com/"

## 登录账号
# 请通过环境变量设置，不要在配置文件中填写真实账号密码
# export HX_USERNAME="your_username"
# export HX_PASSWORD="your_password"
USERNAME = ""  # 从环境变量 HX_USERNAME 读取
PASSWORD = ""  # 从环境变量 HX_PASSWORD 读取

# 目标地区
TARGET_REGION = "安徽"

# 搜索关键词列表（26个审计相关关键词）
KEYWORDS = [
    "审计",
    "会计师事务所",
    "年报审计",
    "年度审计",
    "年度财务报表审计",
    "专项审计",
    "离任审计",
    "经济责任审计",
    "工程决算审计",
    "竣工财务决算审计",
    "工程造价审计",
    "工程审计",
    "内部控制审计",
    "内控审计",
    "内部审计",
    "资产评估审计",
    "清产核资审计",
    "财务收支审计",
    "基本建设审计",
    "拆迁审计",
    "征地审计",
    "村级审计",
    "离任经济责任审计",
    "任中审计",
    "自然资源资产审计",
    "环境审计",
    "绩效审计",
    "合规审计"
]

# 采集限制
MAX_PAGES_PER_KEYWORD = 50  # 每个关键词最大翻页数
MAX_PROJECTS = 200  # 最大采集项目数
PAGE_TIMEOUT = 30000  # 页面加载超时（毫秒）
DETAIL_TIMEOUT = 30000  # 详情页超时（毫秒）

## 评分配置
[SCORING]
# 6维度评分权重（满分100分）
AMOUNT_MATCH_WEIGHT = 20  # 金额匹配度
TIME_WINDOW_WEIGHT = 20  # 时间窗口
QUALIFICATION_MATCH_WEIGHT = 20  # 资质匹配
HISTORY_WIN_RATE_WEIGHT = 15  # 历史中标率
COMPETITION_LEVEL_WEIGHT = 15  # 竞争程度
CLIENT_VALUE_WEIGHT = 10  # 客户价值

## 输出配置
[OUTPUT]
# 输出目录
DATA_DIR = "data"
REPORTS_DIR = "reports"
LOGS_DIR = "logs"

# 文件格式
OUTPUT_FORMAT = "json"
ENCODING = "utf-8"
INDENT = 2

## 日志配置
[LOGGING]
LEVEL = "INFO"
FORMAT = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
FILE_ENABLED = true
CONSOLE_ENABLED = true

## 隐私保护
[PRIVACY]
# 敏感信息隐藏
MASK_PHONE = true
MASK_EMAIL = true

## 自动化配置
[AUTO]
# 定时采集（cron表达式）
SCHEDULE_ENABLED = false
SCHEDULE_CRON = "0 9 * * *"  # 每天上午9点

# 邮件通知
EMAIL_ENABLED = false
EMAIL_RECIPIENTS = []

## 数据源扩展
[SOURCES]
# 可扩展的其他招标网站
# EXTRA_SOURCES = [
#     "https://www.ccgp.gov.cn/",
#     "https://www.zbytb.com/"
# ]
